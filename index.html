<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تلاوات الدكتور سعيد راضي</title>
    <style>
        body {
            background: linear-gradient(135deg, #020617, #0f172a);
            font-family: 'Tahoma', sans-serif;
            text-align: center;
            padding: 20px;
        }
        .player-card {
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 20px;
            max-width: 500px;
            margin: auto;
        }
        select, audio {
            width: 100%;
            margin: 15px 0;
            padding: 12px;
            border-radius: 30px;
        }
        select {
            background: #1e293b;
            color: white;
        }
        h2 { color: #22c55e; }
        .loading { color: #22c55e; display: none; margin: 10px; }
    </style>
</head>
<body>
<div class="player-card">
    <h2>📖 الدكتور سعيد راضي</h2>
    <select id="surahSelect">
        <option value="">-- اختر السورة --</option>
    </select>
    <div class="loading" id="loadingMsg">⏳ جاري تحميل التلاوة...</div>
    <audio id="audioPlayer" controls></audio>
</div>

<script>
    const surahNames = [
        "الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس",
        "هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه",
        "الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم",
        "لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر",
        "فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق",
        "الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة",
        "الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج",
        "نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس",
        "التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد",
        "الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات",
        "القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر",
        "المسد","الإخلاص","الفلق","الناس"
    ];

    const select = document.getElementById("surahSelect");
    const audio = document.getElementById("audioPlayer");
    const loadingMsg = document.getElementById("loadingMsg");

    // رابط الصوت من GitHub
    function getAudioUrl(surahNumber) {
        const num = String(surahNumber).padStart(3, '0');
        return `https://raw.githubusercontent.com/anaslotfysalemhamza-bit/quran-audio/main/audio/${num}.mp3`;
    }

    // إضافة السور للقائمة
    surahNames.forEach((name, index) => {
        const option = document.createElement("option");
        option.value = index + 1;
        option.textContent = `${index+1}. ${name}`;
        select.appendChild(option);
    });

    // عند اختيار سورة
    select.addEventListener("change", async () => {
        const surahNum = select.value;
        if (!surahNum) return;
        
        loadingMsg.style.display = "block";
        const url = getAudioUrl(surahNum);
        audio.src = url;
        
        audio.oncanplay = () => {
            loadingMsg.style.display = "none";
            audio.play().catch(e => console.log("اضغط play للتشغيل"));
        };
        
        audio.onerror = () => {
            loadingMsg.style.display = "none";
            alert("فشل تحميل الصوت. تأكد من وجود الملف: " + url);
        };
    });
</script>
</body>
</html>
